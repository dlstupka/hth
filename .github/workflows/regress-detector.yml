name: HTH detector regression

on:
  push:
    branches:
      - main
    paths:
      - "hth/**"
      - "config/detectors/**"
      - "config/golden_set.json"
      - "requirements.txt"
      - ".github/workflows/regress-detector.yml"
  pull_request:
    branches:
      - main
    paths:
      - "hth/**"
      - "config/detectors/**"
      - "config/golden_set.json"
      - "requirements.txt"
      - ".github/workflows/regress-detector.yml"
  workflow_dispatch:
    inputs:
      detector_config:
        description: Detector parameter-space configuration
        required: true
        default: config/detectors/grabcut.json
        type: string
      golden_set:
        description: Golden Set configuration
        required: true
        default: config/golden_set.json
        type: string
      results_repository:
        description: Repository containing preprocessed images
        required: true
        default: dlstupka/hth-baptisms-san-antonio-1788-1824--1858-1898-results
        type: string
      image_root:
        description: Image directory inside the results repository
        required: true
        default: test/latest/raw
        type: string
      strategy:
        description: Regression search strategy
        required: true
        default: binary-refine
        type: choice
        options:
          - binary-refine
          - exhaustive
      limit:
        description: Optional exhaustive parameter-set limit; blank means no limit
        required: false
        default: ""
        type: string
      max_dimension:
        description: Maximum analysis image dimension
        required: true
        default: "1800"
        type: string
      top:
        description: Number of ranked parameter sets in top20.csv
        required: true
        default: "20"
        type: string
      mode:
        description: Regression mode
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - full
      runner:
        description: Execution runner
        required: true
        default: github-hosted
        type: choice
        options:
          - github-hosted
          - self-hosted-hth
          - self-hosted-windows
  
permissions:
  contents: read

concurrency:
  group: detector-regression-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  regress:
    name: ${{ github.event_name == 'workflow_dispatch' && 'Regress detector against Golden Set' || 'Detector Regression Smoke Test' }}
    runs-on: ${{github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted-windows' && fromJSON('["self-hosted","Windows","X64"]') || github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted-hth' && fromJSON('["self-hosted","Linux","X64","hth"]') || 'ubuntu-latest'}}
    timeout-minutes: ${{ github.event_name == 'workflow_dispatch' && 360 || 30 }}

    env:
      DETECTOR_CONFIG: ${{ github.event_name == 'workflow_dispatch' && inputs.detector_config || 'config/detectors/grabcut.json' }}
      GOLDEN_SET: ${{ github.event_name == 'workflow_dispatch' && inputs.golden_set || 'config/golden_set.json' }}
      RESULTS_REPOSITORY: ${{ github.event_name == 'workflow_dispatch' && inputs.results_repository || 'dlstupka/hth-baptisms-san-antonio-1788-1824--1858-1898-results' }}
      IMAGE_ROOT: ${{ github.event_name == 'workflow_dispatch' && inputs.image_root || 'test/latest/raw' }}
      STRATEGY: ${{ github.event_name == 'workflow_dispatch' && inputs.strategy || 'exhaustive' }}
      LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.limit || '10' }}
      MAX_DIMENSION: ${{ github.event_name == 'workflow_dispatch' && inputs.max_dimension || '1800' }}
      TOP_COUNT: ${{ github.event_name == 'workflow_dispatch' && inputs.top || '10' }}
      HTH_RUNNER_LABELS: ${{ github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted-hth' && 'self-hosted,linux,x64,hth' || 'ubuntu-latest' }}

    steps:
      - name: Checkout HTH pipeline
        uses: actions/checkout@v6
        with:
          path: hth-pipeline
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout results repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.RESULTS_REPOSITORY }}
          path: results-repo
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: hth-pipeline/requirements.txt

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install --requirement hth-pipeline/requirements.txt

      - name: Show OpenCV build
        shell: bash
        env:
          PYTHONPATH: hth-pipeline
        run: |
          python - <<'EOF'
          import cv2

          print(f"OpenCV version: {cv2.__version__}")
          print()

          wanted = (
              "CPU/HW",
              "Baseline:",
              "Dispatched code generation:",
              "Parallel framework",
              "Intel IPP",
              "OpenCL",
              "AVX",
              "SSE",
              "TBB",
              "OpenMP",
          )

          for line in cv2.getBuildInformation().splitlines():
              if any(token in line for token in wanted):
                  print(line)
          EOF
 
      - name: Benchmark OpenCV
        shell: bash
        run: |
          python - <<'EOF'
          import time
          import cv2
          import numpy as np

          image = np.random.default_rng(12345).integers(
              0, 256, size=(3000, 3000), dtype=np.uint8
          )

          # Warm-up
          for _ in range(5):
              cv2.GaussianBlur(image, (9, 9), 0)

          started = time.perf_counter()
          for _ in range(100):
              cv2.GaussianBlur(image, (9, 9), 0)
          elapsed = time.perf_counter() - started

          print(f"GaussianBlur 100 iterations: {elapsed:.3f} seconds")
          print(f"Average per iteration: {elapsed / 100:.6f} seconds")
          EOF
          
      - name: Run detector regression — Linux
        id: regression_linux
        if: runner.os == 'Linux'
        shell: bash
        env:
          PYTHONPATH: hth-pipeline
        run: |
          set -euo pipefail

          mkdir -p regression-output
          export HTH_SOURCE_COMMIT="$(git -C results-repo rev-parse HEAD)"

          echo "Configured limit: '${LIMIT:-}'"

          args=(
            python -m hth.regress_detector
            --detector-config "hth-pipeline/$DETECTOR_CONFIG"
            --golden-set "hth-pipeline/$GOLDEN_SET"
            --image-root "results-repo/$IMAGE_ROOT"
            --output regression-output
            --max-dimension "$MAX_DIMENSION"
            --top "$TOP_COUNT"
          )

          if [[ -n "${LIMIT:-}" ]]; then
            args+=(--strategy exhaustive --limit "$LIMIT")
          else
            args+=(--strategy "$STRATEGY")
          fi

          printf 'Regression command:'
          printf ' %q' "${args[@]}"
          printf '\n'

          "${args[@]}" | tee regression-output/runner-output.json

          RUN_DIR="$(
            find regression-output \
              -mindepth 2 \
              -maxdepth 2 \
              -type d \
              -name 'run-*' |
            sort |
            tail -n 1
          )"

          if [[ -z "$RUN_DIR" ]]; then
            echo "::error::Regression did not create a canonical run directory"
            exit 1
          fi

          echo "run_dir=$RUN_DIR" >> "$GITHUB_OUTPUT"

      - name: Run detector regression — Windows
        id: regression_windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          PYTHONPATH: hth-pipeline
        run: |
          $ErrorActionPreference = "Stop"

          New-Item `
            -ItemType Directory `
            -Force `
            -Path "regression-output" |
            Out-Null

          $env:HTH_SOURCE_COMMIT = (
            git -C results-repo rev-parse HEAD
          ).Trim()

          Write-Host "Configured limit: '$env:LIMIT'"

          $regressionArgs = @(
            "-m", "hth.regress_detector",
            "--detector-config", "hth-pipeline/$env:DETECTOR_CONFIG",
            "--golden-set", "hth-pipeline/$env:GOLDEN_SET",
            "--image-root", "results-repo/$env:IMAGE_ROOT",
            "--output", "regression-output",
            "--max-dimension", $env:MAX_DIMENSION,
            "--top", $env:TOP_COUNT
          )

          if ($env:LIMIT) {
            $regressionArgs += @(
              "--strategy", "exhaustive",
              "--limit", $env:LIMIT
            )
          }
          else {
            $regressionArgs += @(
              "--strategy", $env:STRATEGY
            )
          }

          Write-Host (
            "Regression command: python " +
            ($regressionArgs -join " ")
          )

          & python @regressionArgs 2>&1 |
            Tee-Object `
              -FilePath "regression-output/runner-output.json"

          if ($LASTEXITCODE -ne 0) {
            throw "Detector regression failed with exit code $LASTEXITCODE"
          }

          $runDir = Get-ChildItem `
              -Path "regression-output" `
              -Directory `
              -Recurse |
            Where-Object {
              $_.Name -like "run-*"
            } |
            Sort-Object FullName |
            Select-Object -Last 1

          if (-not $runDir) {
            throw "Regression did not create a canonical run directory"
          }

          $relativeRunDir = [System.IO.Path]::GetRelativePath(
            (Get-Location).Path,
            $runDir.FullName
          ).Replace('\', '/')

          "run_dir=$relativeRunDir" |
            Out-File `
              -FilePath $env:GITHUB_OUTPUT `
              -Encoding utf8 `
              -Append
              
      - name: Write Regression Manifest
        if: ${{ always() && steps.regression.outcome == 'success' }}
        shell: bash
        env:
          PYTHONPATH: hth-pipeline
          HTH_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python hth-pipeline/hth/write_regression_summary.py \
            --run-dir "${{ steps.regression_linux.outputs.run_dir || steps.regression_windows.outputs.run_dir }}" \
            --output regression-summary.md
          cat regression-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload regression run
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: detector-regression-${{ github.run_id }}
          path: |
            regression-output/
            regression-summary.md
          if-no-files-found: warn
          retention-days: 14
