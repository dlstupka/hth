name: HTH detector regression

run-name: >-
  ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'full'
      && 'Regress detector against Golden Set'
      || 'Smoke test detector against Golden Set' }}

on:
  push:
    branches:
      - main
    paths:
      - "hth/**"
      - "config/detectors/**"
      - "config/golden_set.json"
      - "requirements.txt"
      - ".github/workflows/regress-detector.yml"
  pull_request:
    branches:
      - main
    paths:
      - "hth/**"
      - "config/detectors/**"
      - "config/golden_set.json"
      - "requirements.txt"
      - ".github/workflows/regress-detector.yml"
  workflow_dispatch:
    inputs:
      detector_config:
        description: Detector parameter-space configuration
        required: true
        default: config/detectors/grabcut.json
        type: string
      golden_set:
        description: Golden Set configuration
        required: true
        default: config/golden_set.json
        type: string
      results_repository:
        description: Repository containing preprocessed images
        required: true
        default: dlstupka/hth-baptisms-san-antonio-1788-1824--1858-1898-results
        type: string
      image_root:
        description: Image directory inside the results repository
        required: true
        default: test/latest/raw
        type: string
      strategy:
        description: Regression search strategy
        required: true
        default: binary-refine
        type: choice
        options:
          - binary-refine
          - exhaustive
      limit:
        description: Optional exhaustive parameter-set limit; blank means no limit
        required: false
        default: ""
        type: string
      max_dimension:
        description: Maximum analysis image dimension
        required: true
        default: "1800"
        type: string
      top:
        description: Number of ranked parameter sets in top20.csv
        required: true
        default: "20"
        type: string
      mode:
        description: Regression mode
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - full
      runner:
        description: Execution runner
        required: true
        default: github-hosted
        type: choice
        options:
          - github-hosted
          - self-hosted-hth
          - self-hosted-windows
          - self-hosted-rhel8
          - self-hosted-e7k
          - self-hosted-e9k
  
permissions:
  contents: read

concurrency:
  group: >-
    ${{ github.workflow }}-${{ github.ref }}-${{
      github.event_name == 'workflow_dispatch'
      && inputs.runner
      || 'automatic'
    }}
  cancel-in-progress: false

jobs:
  regress:
    name: >-
      ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'full'
          && 'Regress detector against Golden Set'
          || 'Smoke test detector against Golden Set' }}
    runs-on: >-
      ${{    github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted-windows' && fromJSON('["self-hosted","Windows","X64"]')
          || github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted-hth'     && fromJSON('["self-hosted","Linux","X64","hth"]')
          || github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted-rhel8'   && fromJSON('["self-hosted","Linux","X64","rhel8"]')
          || github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted-e7k'     && fromJSON('["self-hosted","Linux","X64","e7k"]')
          || github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted-e9k'     && fromJSON('["self-hosted","Linux","X64","e9k"]')
          || 'ubuntu-latest'}}
    timeout-minutes: ${{ github.event_name == 'workflow_dispatch' && 360 || 30 }}

    env:
      DETECTOR_CONFIG: ${{ github.event_name == 'workflow_dispatch' && inputs.detector_config || 'config/detectors/grabcut.json' }}
      GOLDEN_SET: ${{ github.event_name == 'workflow_dispatch' && inputs.golden_set || 'config/golden_set.json' }}
      RESULTS_REPOSITORY: ${{ github.event_name == 'workflow_dispatch' && inputs.results_repository || 'dlstupka/hth-baptisms-san-antonio-1788-1824--1858-1898-results' }}
      IMAGE_ROOT: ${{ github.event_name == 'workflow_dispatch' && inputs.image_root || 'test/latest/raw' }}
      REGRESSION_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'smoke' }}
      STRATEGY: ${{ github.event_name == 'workflow_dispatch' && inputs.strategy || 'exhaustive' }}
      LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.limit || '' }}
      MAX_DIMENSION: ${{ github.event_name == 'workflow_dispatch' && inputs.max_dimension || '1800' }}
      TOP_COUNT: ${{ github.event_name == 'workflow_dispatch' && inputs.top || '10' }}
      PYTHONNOUSERSITE: "1"
      HTH_RUNNER_LABELS: >-
        ${{  github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted-hth' && 'self-hosted,linux,x64,hth'
          || github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted-rhel8' && 'self-hosted,linux,x64,rhel8'
          || github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted-e7k' && 'self-hosted,linux,x64,e7k'
          || github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted-e9k' && 'self-hosted,linux,x64,e9k'
          || github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted-windows' && 'self-hosted,windows,x64'
          || 'ubuntu-latest' }}
      HTH_EXECUTION_ENVIRONMENT: ${{ runner.environment }}
      HTH_RUNNER_DISPLAY_NAME: >-
        ${{ runner.environment == 'github-hosted' && 'github-hosted' || runner.name }}
      HTH_RUNNER_LABEL: >-
        ${{  github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted-hth' && 'hth'
          || github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted-rhel8' && 'rhel8'
          || github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted-e7k' && 'e7k'
          || github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted-e9k' && 'e9k'
          || github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted-windows' && 'windows'
          || 'ubuntu-latest' }}

    steps:
      - name: Checkout HTH pipeline
        uses: actions/checkout@v6
        with:
          path: hth-pipeline
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout results repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.RESULTS_REPOSITORY }}
          path: results-repo
          fetch-depth: 1
          persist-credentials: false

      - name: Runner diagnostics
        run: |
          echo "runner.os=${{ runner.os }}"
          echo "runner.arch=${{ runner.arch }}"
          echo "runner.environment=${{ runner.environment }}"
          echo "runner.name=${{ runner.name }}"
      
      - name: Set up Python — GitHub-hosted Linux
        if: ${{ runner.os == 'Linux' && runner.environment == 'github-hosted' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: hth-pipeline/requirements.txt

      - name: Verify Python — self-hosted Linux
        if: ${{ runner.os == 'Linux' && runner.environment == 'self-hosted' }}
        shell: bash
        run: |
          set -euo pipefail

          echo "python: $(command -v python)"
          python --version
          python -m pip --version

          python - <<'PY'
          import sys

          if sys.version_info[:2] != (3, 12):
              raise SystemExit(
                  f"Expected Python 3.12, got {sys.version} "
                  f"from {sys.executable}"
              )

          print(f"Python executable: {sys.executable}")
          PY
          
      - name: Use repaired Python tool cache — Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $pythonVersion = "3.12.10"
          $pythonRoot = Join-Path `
            $env:RUNNER_TOOL_CACHE `
            "Python\$pythonVersion\x64"
          $pythonExe = Join-Path $pythonRoot "python.exe"
          $completeMarker = "$pythonRoot.complete"
          $scriptsDir = Join-Path $pythonRoot "Scripts"

          if (-not (Test-Path -LiteralPath $completeMarker)) {
            throw "Python tool-cache marker is missing: $completeMarker"
          }

          if (-not (Test-Path -LiteralPath $pythonExe)) {
            throw "Python executable is missing: $pythonExe"
          }

          # Make this interpreter canonical for this step and all later steps.
          $env:PATH = "$pythonRoot;$scriptsDir;$env:PATH"
          $pythonRoot | Out-File `
            -FilePath $env:GITHUB_PATH `
            -Encoding utf8 `
            -Append
          $scriptsDir | Out-File `
            -FilePath $env:GITHUB_PATH `
            -Encoding utf8 `
            -Append

          $actualVersion = & $pythonExe -c `
            "import sys; print('.'.join(map(str, sys.version_info[:3])))"

          if ($LASTEXITCODE -ne 0) {
            throw "Unable to execute $pythonExe"
          }

          if ($actualVersion.Trim() -ne $pythonVersion) {
            throw "Expected Python $pythonVersion; found $actualVersion"
          }

          & $pythonExe -m pip --version
          if ($LASTEXITCODE -ne 0) {
            Write-Host "pip is missing; bootstrapping with ensurepip"
            & $pythonExe -m ensurepip --upgrade
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to bootstrap pip"
            }
          }

          Write-Host "Using Python: $pythonExe"
          & $pythonExe --version
          & $pythonExe -m pip --version

      - name: Create isolated Python environment
        shell: bash
        run: |
          set -euo pipefail

          bootstrap_python="$(command -v python)"
          venv_dir="$RUNNER_TEMP/hth-python-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          echo "Bootstrap Python: $bootstrap_python"
          "$bootstrap_python" --version
          "$bootstrap_python" -m pip --version

          rm -rf "$venv_dir"
          "$bootstrap_python" -m venv "$venv_dir"

          if [[ "${RUNNER_OS:-}" == "Windows" ]]; then
            venv_bin="$venv_dir/Scripts"
            venv_python="$venv_bin/python.exe"
            github_path_entry="$(cygpath -w "$venv_bin")"
          else
            venv_bin="$venv_dir/bin"
            venv_python="$venv_bin/python"
            github_path_entry="$venv_bin"
          fi

          if [[ ! -x "$venv_python" ]]; then
            echo "::error::Virtual-environment Python is missing: $venv_python"
            exit 1
          fi

          echo "$github_path_entry" >> "$GITHUB_PATH"
          echo "HTH_VENV=$venv_dir" >> "$GITHUB_ENV"
          echo "HTH_BOOTSTRAP_PYTHON=$bootstrap_python" >> "$GITHUB_ENV"

          "$venv_python" -m pip install --upgrade pip

          "$venv_python" - <<'PY'
          import site
          import sys

          print(f"Venv executable : {sys.executable}")
          print(f"sys.prefix      : {sys.prefix}")
          print(f"sys.base_prefix : {sys.base_prefix}")
          print(f"User site       : {site.USER_SITE}")
          print(f"User site active: {site.ENABLE_USER_SITE}")

          if sys.prefix == sys.base_prefix:
              raise SystemExit("Virtual environment is not active")
          if site.ENABLE_USER_SITE:
              raise SystemExit("User site-packages unexpectedly enabled")
          PY

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          echo "Active Python: $(command -v python)"
          python --version
          python -m pip --version
          python -m pip install --requirement hth-pipeline/requirements.txt
          python -m pip check

      - name: Verify Python dependency ABI
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import sys
          import cv2
          import numpy
          import skimage

          print(f"Python       : {sys.executable}")
          print(f"NumPy        : {numpy.__version__} ({numpy.__file__})")
          print(f"scikit-image : {skimage.__version__} ({skimage.__file__})")
          print(f"OpenCV       : {cv2.__version__} ({cv2.__file__})")
          PY

      - name: Show toolchain environment
        shell: bash
        run: |
          set -euo pipefail

          echo "Toolchain Environment"
          echo "====================="
          echo "Runner name      : ${RUNNER_NAME:-unknown}"
          echo "Runner OS        : ${RUNNER_OS:-unknown}"
          echo "Runner arch      : ${RUNNER_ARCH:-unknown}"
          echo "Runner toolcache : ${RUNNER_TOOL_CACHE:-unknown}"
          echo "SHELL            : ${SHELL:-unset}"
          echo "MSYSTEM          : ${MSYSTEM:-unset}"
          echo "OSTYPE           : ${OSTYPE:-unset}"
          echo

          echo "Shell resolution"
          echo "----------------"
          echo "bash executable  : $(command -v bash)"
          echo "sh executable    : $(command -v sh)"
          type -a bash || true
          type -a sh || true
          bash --version | head -n 1
          echo

          echo "Tool resolution"
          echo "---------------"
          echo "git executable   : $(command -v git)"
          type -a git || true
          git --version
          echo "bootstrap Python : ${HTH_BOOTSTRAP_PYTHON:-unknown}"
          echo "virtual env      : ${HTH_VENV:-unknown}"
          echo "active Python    : $(command -v python)"
          type -a python || true
          python --version
          python -m pip --version
          
          python - <<'PY'
          import os
          import platform
          import sys
          import cv2
          import numpy

          print(f"OpenCV file      : {cv2.__file__}")
          print(f"NumPy file       : {numpy.__file__}")
          print(f"sys.executable   : {sys.executable}")
          print(f"sys.version      : {sys.version.splitlines()[0]}")
          print(f"platform         : {platform.platform()}")
          print(f"process arch     : {platform.machine()}")
          print(f"PYTHONPATH       : {os.environ.get('PYTHONPATH', 'unset')}")
          PY

          echo
          echo "Filesystem"
          echo "----------------------"
          pwd

          if [[ "${RUNNER_OS:-}" == "Windows" ]]; then
            echo "Native Windows cwd : $(pwd -W)"
            echo "POSIX -> Windows   : $(cygpath -w .)"
            echo "Workspace -> POSIX : $(cygpath -u "${GITHUB_WORKSPACE:-.}")"

            echo
            echo "Windows executable resolution"
            echo "-----------------------------"
            where.exe bash || true
            where.exe sh || true
            where.exe git || true
            where.exe python || true
            where.exe py || true

            echo
            echo "Git Bash path translation"
            echo "-------------------------"
            echo "cygpath executable : $(command -v cygpath)"
            echo "POSIX root         : /"
            echo "Windows root       : $(cygpath -w /)"
          else
            echo "Native POSIX filesystem; MSYS path translation not applicable."
            echo "Workspace          : ${GITHUB_WORKSPACE:-unset}"
          fi

          echo
          echo "PATH entries"
          echo "------------"
          tr ':' '\n' <<< "$PATH"

      - name: Show OpenCV build
        shell: bash
        env:
          PYTHONPATH: hth-pipeline
        run: |
          python - <<'EOF'
          import cv2

          print(f"OpenCV version: {cv2.__version__}")
          print()

          wanted = (
              "CPU/HW",
              "Baseline:",
              "Dispatched code generation:",
              "Parallel framework",
              "Intel IPP",
              "OpenCL",
              "AVX",
              "SSE",
              "TBB",
              "OpenMP",
          )

          for line in cv2.getBuildInformation().splitlines():
              if any(token in line for token in wanted):
                  print(line)
          EOF
 
      - name: Benchmark OpenCV
        shell: bash
        run: |
          python - <<'EOF'
          import os
          import time
          import cv2
          import numpy as np

          image = np.random.default_rng(12345).integers(
              0, 256, size=(3000, 3000), dtype=np.uint8
          )

          # Warm-up
          for _ in range(5):
              cv2.GaussianBlur(image, (9, 9), 0)

          started = time.perf_counter()
          for _ in range(100):
              cv2.GaussianBlur(image, (9, 9), 0)
          elapsed = time.perf_counter() - started

          average = elapsed / 100
          print(f"GaussianBlur 100 iterations: {elapsed:.3f} seconds")
          print(f"Average per iteration: {average:.6f} seconds")

          github_env = os.environ.get("GITHUB_ENV")
          if github_env:
              with open(github_env, "a", encoding="utf-8") as stream:
                  stream.write(f"HTH_OPENCV_BENCHMARK_SECONDS={elapsed:.9f}\n")
                  stream.write(f"HTH_OPENCV_BENCHMARK_AVERAGE_SECONDS={average:.9f}\n")
          EOF
          
      - name: Run detector regression
        id: regression
        shell: bash
        env:
          PYTHONPATH: hth-pipeline
        run: |
          set -euo pipefail

          mkdir -p regression-output
          export HTH_SOURCE_COMMIT="$(git -C results-repo rev-parse HEAD)"

          effective_limit="${LIMIT:-}"
          if [[ "$REGRESSION_MODE" == "smoke" && -z "$effective_limit" ]]; then
            effective_limit="10"
          fi

          echo "Regression mode : $REGRESSION_MODE"
          echo "Configured limit: '${LIMIT:-}'"
          echo "Effective limit : '${effective_limit:-}'"

          args=(
            python -m hth.regress_detector
            --detector-config "hth-pipeline/$DETECTOR_CONFIG"
            --golden-set "hth-pipeline/$GOLDEN_SET"
            --image-root "results-repo/$IMAGE_ROOT"
            --output regression-output
            --max-dimension "$MAX_DIMENSION"
            --top "$TOP_COUNT"
          )

          if [[ -n "${effective_limit:-}" ]]; then
            args+=(--strategy exhaustive --limit "$effective_limit")
          else
            args+=(--strategy "$STRATEGY")
          fi

          detector_name="$(python - "hth-pipeline/$DETECTOR_CONFIG" <<'PY'
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          print(payload.get("detector", "unknown"))
          PY
          )"

          effective_strategy="$STRATEGY"
          if [[ -n "${effective_limit:-}" ]]; then
            effective_strategy="exhaustive"
          fi

          echo
          echo "Regression Invocation"
          echo "====================="
          printf '%-22s: %s\n' "Mode" "$REGRESSION_MODE"
          printf '%-22s: %s\n' "Detector" "$detector_name"
          printf '%-22s: %s\n' "Detector config" "hth-pipeline/$DETECTOR_CONFIG"
          printf '%-22s: %s\n' "Strategy" "$effective_strategy"
          printf '%-22s: %s\n' "Golden Set" "hth-pipeline/$GOLDEN_SET"
          printf '%-22s: %s\n' "Image root" "results-repo/$IMAGE_ROOT"
          printf '%-22s: %s\n' "Output" "regression-output"
          printf '%-22s: %s\n' "Maximum dimension" "$MAX_DIMENSION"
          printf '%-22s: %s\n' "Top candidates" "$TOP_COUNT"
          printf '%-22s: %s\n' "Parameter-set limit" "${effective_limit:-none}"
          if [[ -n "${HTH_OPENCV_BENCHMARK_SECONDS:-}" ]]; then
            printf '%-22s: %.3f s total; %.0f µs/iteration\n' \
              "OpenCV benchmark" \
              "$HTH_OPENCV_BENCHMARK_SECONDS" \
              "$(python -c 'import os; print(float(os.environ["HTH_OPENCV_BENCHMARK_AVERAGE_SECONDS"])*1_000_000)')"
          fi
          echo

          printf 'Regression command:'
          printf ' %q' "${args[@]}"
          printf '\n\n'

          "${args[@]}" | tee regression-output/runner-output.json

          RUN_DIR="$(
            find regression-output \
              -mindepth 2 \
              -maxdepth 2 \
              -type d \
              -name 'run-*' |
            sort |
            tail -n 1
          )"

          if [[ -z "$RUN_DIR" ]]; then
            echo "::error::Regression did not create a canonical run directory"
            exit 1
          fi

          echo "run_dir=$RUN_DIR" >> "$GITHUB_OUTPUT"

      - name: Write Regression Manifest
        if: ${{ always() && steps.regression.outcome == 'success' }}
        shell: bash
        env:
          PYTHONPATH: hth-pipeline
          HTH_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python hth-pipeline/hth/write_regression_summary.py \
            --run-dir "${{ steps.regression.outputs.run_dir }}" \
            --output regression-summary.md
          cat regression-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload regression run
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: detector-regression-${{ github.run_id }}
          path: |
            regression-output/
            regression-summary.md
          if-no-files-found: warn
          retention-days: 14
