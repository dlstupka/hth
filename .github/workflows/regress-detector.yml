name: HTH detector regression

on:
  push:
    branches:
      - main
    paths:
      - "hth/**"
      - "config/detectors/**"
      - "config/golden_set.json"
      - "requirements.txt"
      - ".github/workflows/regress-detector.yml"
  pull_request:
    branches:
      - main
    paths:
      - "hth/**"
      - "config/detectors/**"
      - "config/golden_set.json"
      - "requirements.txt"
      - ".github/workflows/regress-detector.yml"
  workflow_dispatch:
    inputs:
      detector_config:
        description: Detector parameter-space configuration
        required: true
        default: config/detectors/grabcut.json
        type: string
      golden_set:
        description: Golden Set configuration
        required: true
        default: config/golden_set.json
        type: string
      results_repository:
        description: Repository containing preprocessed images
        required: true
        default: dlstupka/hth-baptisms-san-antonio-1788-1824--1858-1898-results
        type: string
      image_root:
        description: Image directory inside the results repository
        required: true
        default: test/latest/raw
        type: string
      strategy:
        description: Regression search strategy
        required: true
        default: binary-refine
        type: choice
        options:
          - binary-refine
          - exhaustive
      limit:
        description: Optional exhaustive parameter-set limit; blank means no limit
        required: false
        default: ""
        type: string
      max_dimension:
        description: Maximum analysis image dimension
        required: true
        default: "1800"
        type: string
      top:
        description: Number of ranked parameter sets in top20.csv
        required: true
        default: "20"
        type: string
      mode:
        description: Regression mode
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - full
      runner:
        description: Execution runner
        required: true
        default: github-hosted
        type: choice
        options:
          - github-hosted
          - self-hosted-hth

permissions:
  contents: read

concurrency:
  group: detector-regression-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  regress:
    name: ${{ github.event_name == 'workflow_dispatch' && 'Regress detector against Golden Set' || 'Detector Regression Smoke Test' }}
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted-hth' && fromJSON('["self-hosted","Linux","X64","hth"]') || 'ubuntu-latest' }}
    timeout-minutes: ${{ github.event_name == 'workflow_dispatch' && 360 || 30 }}

    env:
      DETECTOR_CONFIG: ${{ github.event_name == 'workflow_dispatch' && inputs.detector_config || 'config/detectors/grabcut.json' }}
      GOLDEN_SET: ${{ github.event_name == 'workflow_dispatch' && inputs.golden_set || 'config/golden_set.json' }}
      RESULTS_REPOSITORY: ${{ github.event_name == 'workflow_dispatch' && inputs.results_repository || 'dlstupka/hth-baptisms-san-antonio-1788-1824--1858-1898-results' }}
      IMAGE_ROOT: ${{ github.event_name == 'workflow_dispatch' && inputs.image_root || 'test/latest/raw' }}
      STRATEGY: ${{ github.event_name == 'workflow_dispatch' && inputs.strategy || 'exhaustive' }}
      LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.limit || '10' }}
      MAX_DIMENSION: ${{ github.event_name == 'workflow_dispatch' && inputs.max_dimension || '1800' }}
      TOP_COUNT: ${{ github.event_name == 'workflow_dispatch' && inputs.top || '10' }}
      HTH_RUNNER_LABELS: ${{ github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted-hth' && 'self-hosted,linux,x64,hth' || 'ubuntu-latest' }}

    steps:
      - name: Checkout HTH pipeline
        uses: actions/checkout@v6
        with:
          path: hth-pipeline
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout results repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.RESULTS_REPOSITORY }}
          path: results-repo
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: hth-pipeline/requirements.txt

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install --requirement hth-pipeline/requirements.txt

      - name: Run detector regression
        id: regression
        shell: bash
        env:
          PYTHONPATH: hth-pipeline
        run: |
          set -euo pipefail
          mkdir -p regression-output
          export HTH_SOURCE_COMMIT="$(git -C results-repo rev-parse HEAD)"

          echo "Configured limit: '${LIMIT:-}'"

          args=(
            python -m hth.regress_detector
            --detector-config "hth-pipeline/$DETECTOR_CONFIG"
            --golden-set "hth-pipeline/$GOLDEN_SET"
            --image-root "results-repo/$IMAGE_ROOT"
            --output regression-output
            --strategy "$STRATEGY"
            --max-dimension "$MAX_DIMENSION"
            --top "$TOP_COUNT"
          )
          if [[ -n "${LIMIT:-}" ]]; then
            args+=(--strategy exhaustive --limit "$LIMIT")
          else
            args+=(--strategy "$STRATEGY")
          fi
      
          printf 'Regression command:'
          printf ' %q' "${args[@]}"
          printf '\n'
      
          "${args[@]}" | tee regression-output/runner-output.json

          RUN_DIR="$(find regression-output -mindepth 2 -maxdepth 2 -type d -name 'run-*' | sort | tail -n 1)"
          if [[ -z "$RUN_DIR" ]]; then
            echo "::error::Regression did not create a canonical run directory"
            exit 1
          fi
          echo "run_dir=$RUN_DIR" >> "$GITHUB_OUTPUT"

      - name: Write Regression Manifest
        if: ${{ always() && steps.regression.outcome == 'success' }}
        shell: bash
        env:
          PYTHONPATH: hth-pipeline
          HTH_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python hth-pipeline/hth/write_regression_summary.py \
            --run-dir "${{ steps.regression.outputs.run_dir }}" \
            --output regression-summary.md
          cat regression-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload regression run
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: detector-regression-${{ github.run_id }}
          path: |
            regression-output/
            regression-summary.md
          if-no-files-found: warn
          retention-days: 14
