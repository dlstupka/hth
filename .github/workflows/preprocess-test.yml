name: HTH preprocess test

on:
  push:
    branches:
      - main
    paths:
      - "hth/**"
      - "config/**"
      - "requirements.txt"
      - ".github/workflows/**"

  pull_request:
    branches:
      - main
    paths:
      - "hth/**"
      - "config/**"
      - "requirements.txt"
      - ".github/workflows/**"

  workflow_dispatch:
    inputs:
      test_file:
        description: "DOCX filename to process"
        required: true
        type: string
        default: "Baptisms-San-Antonio-Baptism-Records-1788-1824--1858-1898_p91-100.docx"

permissions:
  contents: read

concurrency:
  group: preprocess-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preprocess-test:
    name: Test one DOCX master
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SOURCE_REPOSITORY: dlstupka/hth-baptisms-san-antonio-1788-1824--1858-1898
      RESULTS_REPOSITORY: dlstupka/hth-baptisms-san-antonio-1788-1824--1858-1898-results
      DEFAULT_TEST_FILE: Baptisms-San-Antonio-Baptism-Records-1788-1824--1858-1898_p91-100.docx
      OUTPUT_DIRECTORY: hth-pipeline/build/preprocessed-test

    steps:
      - name: Checkout HTH pipeline
        uses: actions/checkout@v6
        with:
          path: hth-pipeline
          persist-credentials: false

      - name: Checkout source repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          path: source-repo
          lfs: true
          persist-credentials: false

      - name: Checkout results repository
        # Do not publish results from an untrusted fork pull request.
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/checkout@v6
        with:
          repository: ${{ env.RESULTS_REPOSITORY }}
          path: results-repo
          ref: main
          token: ${{ secrets.HTH_RESULTS_TOKEN }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: hth-pipeline/requirements.txt

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r hth-pipeline/requirements.txt

      - name: Select test source
        id: source
        shell: bash
        env:
          DISPATCH_TEST_FILE: ${{ inputs.test_file }}
        run: |
          set -euo pipefail

          TEST_FILE="${DISPATCH_TEST_FILE:-$DEFAULT_TEST_FILE}"
          INPUT_PATH="source-repo/images/$TEST_FILE"

          if [[ ! -f "$INPUT_PATH" ]]; then
            echo "::error::Test DOCX does not exist: $INPUT_PATH"
            echo "Available DOCX files:"
            find source-repo/images -maxdepth 1 -type f -name '*.docx' \
              -printf '%f\n' | sort -V
            exit 1
          fi

          echo "input_path=$INPUT_PATH" >> "$GITHUB_OUTPUT"
          echo "test_file=$TEST_FILE" >> "$GITHUB_OUTPUT"

      - name: Capture build identity
        id: build
        shell: bash
        run: |
          set -euo pipefail
      
          PIPELINE_COMMIT="$(git -C hth-pipeline rev-parse HEAD)"
          SOURCE_COMMIT="$(git -C source-repo rev-parse HEAD)"
          PROCESSED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
      
          echo "pipeline_commit=$PIPELINE_COMMIT" >> "$GITHUB_OUTPUT"
          echo "source_commit=$SOURCE_COMMIT" >> "$GITHUB_OUTPUT"
          echo "processed_at=$PROCESSED_AT" >> "$GITHUB_OUTPUT"
      
          {
            echo "## HTH preprocessing test"
            echo
            echo "### Build provenance"
            echo
            echo "- Source repository: \`$SOURCE_REPOSITORY\`"
            echo "- Source commit: \`$SOURCE_COMMIT\`"
            echo "- Test file: \`${{ steps.source.outputs.test_file }}\`"
            echo "- Pipeline repository: \`${GITHUB_REPOSITORY}\`"
            echo "- Pipeline commit: \`$PIPELINE_COMMIT\`"
            echo "- Workflow run: \`${GITHUB_RUN_ID}\`"
            echo "- Processed at: \`$PROCESSED_AT\`"
          } >> "$GITHUB_STEP_SUMMARY"
    
      - name: Run test preprocessor
        shell: bash
        run: |
          set -euo pipefail

          python hth-pipeline/hth/preprocess.py \
            --input "${{ steps.source.outputs.input_path }}" \
            --output "$OUTPUT_DIRECTORY" \
            --config hth-pipeline/config/preprocess.json \
            --source-repository "$SOURCE_REPOSITORY" \
            --source-commit "${{ steps.build.outputs.source_commit }}" \
            --pipeline-repository "${{ github.repository }}" \
            --pipeline-commit "${{ steps.build.outputs.pipeline_commit }}" \
            --derive \
            --contact-sheets \
            --overwrite

      - name: Run physical page analysis
        shell: bash
        run: |
          set -euo pipefail

          python hth-pipeline/hth/analyze_pages.py \
            --manifest "$OUTPUT_DIRECTORY/metadata/image_manifest.json" \
            --image-root "$OUTPUT_DIRECTORY" \
            --output "$OUTPUT_DIRECTORY/page-analysis" \
            --source-repository "${{ inputs.source_repository }}" \
            --source-commit "${{ steps.build.outputs.source_commit }}" \
            --pipeline-repository "${{ github.repository }}" \
            --pipeline-commit "${{ steps.build.outputs.pipeline_commit }}"

      - name: Verify test outputs
        shell: bash
        run: |
          set -euo pipefail

          test -f "$OUTPUT_DIRECTORY/summary.json"
          test -f "$OUTPUT_DIRECTORY/metadata/image_manifest.json"
          test -f "$OUTPUT_DIRECTORY/metadata/image_manifest.csv"
          test -f "$OUTPUT_DIRECTORY/metadata/exact_duplicates.json"
          
          test -f "$OUTPUT_DIRECTORY/page-analysis/page-analysis.json"
          test -f "$OUTPUT_DIRECTORY/page-analysis/page-analysis.csv"
          test -f "$OUTPUT_DIRECTORY/page-analysis/review-queue.csv"
          test -f "$OUTPUT_DIRECTORY/page-analysis/analysis-summary.json"
          
          python - "$OUTPUT_DIRECTORY/summary.json" <<'PY'
          import json
          import sys
          from pathlib import Path

          summary = json.loads(
              Path(sys.argv[1]).read_text(encoding="utf-8")
          )

          docx_count = summary.get("source_docx_count", 0)
          image_count = summary.get("image_count", 0)

          if docx_count != 1:
              raise SystemExit(
                  f"Expected 1 DOCX in test mode; found {docx_count}"
              )

          if image_count < 1:
              raise SystemExit("Test produced no images")

          print(f"Verified {docx_count} DOCX and {image_count} images")
          PY

      - name: Prepare test publication
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          LATEST="results-repo/test/latest"
          HISTORY="results-repo/test/history/run-${GITHUB_RUN_NUMBER}"

          rm -rf "$LATEST"
          mkdir -p \
            "$LATEST/metadata" \
            "$LATEST/analysis" \
            "$HISTORY"
          
          cp "$OUTPUT_DIRECTORY/summary.json" \
             "$LATEST/summary.json"

          cp -a "$OUTPUT_DIRECTORY/metadata/." \
             "$LATEST/metadata/"

          cp "$OUTPUT_DIRECTORY/page-analysis/page-analysis.json" \
             "$LATEST/analysis/"

          cp "$OUTPUT_DIRECTORY/page-analysis/page-analysis.csv" \
             "$LATEST/analysis/"

          cp "$OUTPUT_DIRECTORY/page-analysis/review-queue.csv" \
             "$LATEST/analysis/"

          cp "$OUTPUT_DIRECTORY/page-analysis/analysis-summary.json" \
             "$LATEST/analysis/"
             
          cat > "$LATEST/BUILD-INFO.yaml" <<EOF
          schema_version: 1
          build_type: test
          status: successful

          source:
            repository: $SOURCE_REPOSITORY
            commit: ${{ steps.build.outputs.source_commit }}
            file: ${{ steps.source.outputs.test_file }}

          pipeline:
            repository: ${{ github.repository }}
            commit: ${{ steps.build.outputs.pipeline_commit }}
            workflow: ${{ github.workflow }}
            workflow_run_id: ${{ github.run_id }}
            workflow_run_number: ${{ github.run_number }}

          build:
            processed_at_utc: ${{ steps.build.outputs.processed_at }}
            output_location: test/latest
          EOF

          cp "$LATEST/BUILD-INFO.yaml" \
             "$HISTORY/BUILD-INFO.yaml"

          cp "$LATEST/summary.json" \
             "$HISTORY/summary.json"

          cp "$LATEST/analysis/analysis-summary.json" \
             "$HISTORY/analysis-summary.json"
             
      - name: Commit test results
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          git -C results-repo config user.name "github-actions[bot]"
          git -C results-repo config \
            user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git -C results-repo add test/

          if git -C results-repo diff --cached --quiet; then
            echo "Test results are unchanged; nothing to commit."

            {
              echo
              echo "### Results repository validation"
              echo
              echo "Checkout succeeded; generated test content was unchanged."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            git -C results-repo commit \
              -m "Record preprocessing test run ${GITHUB_RUN_NUMBER}"

            git -C results-repo push origin main

            RESULTS_COMMIT="$(git -C results-repo rev-parse HEAD)"

            {
              echo
              echo "### Results repository validation"
              echo
              echo "- Cross-repository checkout: successful"
              echo "- Test publication: successful"
              echo "- Results commit: \`$RESULTS_COMMIT\`"
              echo "- Published under: \`test/latest/\`"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Add test result to job summary
        if: always()
        shell: bash
        run: |
          {
            echo
            echo "### Test result"
            echo
            if [[ -f "$OUTPUT_DIRECTORY/summary.json" ]]; then
              echo '```json'
              cat "$OUTPUT_DIRECTORY/summary.json"
              echo
              echo '```'
            else
              echo "No summary was generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload temporary test artifact
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: hth-preprocess-test-${{ github.sha }}
          path: ${{ env.OUTPUT_DIRECTORY }}
          if-no-files-found: error
          retention-days: 7
          compression-level: 6